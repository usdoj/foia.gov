name: Test Pull Requests
on: [pull_request]  
jobs:
  # Build for the Acquia Cloud development environment
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: ruby/setup-ruby@v1
        name: Setup RUBY
      - name: Install dependencies
        run: | 
          npm i
          bundle install
      - name: Run tests
        run: |
          sh build/update-linux-sandbox.sh
          make test
